<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GSM Recycling - recykling telefonów w Poznaniu i całej Polsce. Poddajemy recyklingowi stare, zepsute i niepotrzebne telefony, żeby ich wpływ na środowisko był jak najmniejszy.">
    <meta name="keywords" content="telefony, smartfony, ekologia, recykling, środowisko, zepsute, śmieci, gsmrecycling, gsmdoctor">
    
    <title>GSM Recycling</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/font.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="shortcut icon" href="./assets/img/favicon-gsmrecycling.png" type="image/x-icon">
</head>
<body class="bg-white antialiased lato">

    <!-- ===== HEADER ===== -->
    <header class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-lg z-50 border-b border-gray-100/60">
        <div class="max-w-7xl mx-auto px-6 sm:px-10 lg:px-16">
            <div class="flex items-center justify-between h-20 lg:h-24">

                <a href="/" class="shrink-0 flex items-center gap-0.5 md:gap-1">
                    <img src="./assets/img/Logo-GSM-Recycling-Light.png" alt="GSM Recycling Logo" class="h-20 md:h-24 w-auto">
                    <span class="bitsumishi text-3xl tracking-tight font-bold hidden sm:block">GSM Recycling</span>
                </a>

                <nav class="hidden lg:flex items-center gap-8">
                    <a href="#home" class="lato text-base tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300 relative py-1 after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-[var(--accent)] after:transition-all after:duration-300 hover:after:w-full">Home</a>
                    <a href="#about" class="lato text-base tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300 relative py-1 after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-[var(--accent)] after:transition-all after:duration-300 hover:after:w-full">O nas</a>
                    <a href="#how-it-works" class="lato text-base tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300 relative py-1 after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-[var(--accent)] after:transition-all after:duration-300 hover:after:w-full">Jak to działa?</a>
                    <a href="#contact" class="lato text-base tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300 relative py-1 after:absolute after:bottom-0 after:left-0 after:w-0 after:h-[2px] after:bg-[var(--accent)] after:transition-all after:duration-300 hover:after:w-full">Kontakt</a>
                </nav>

                <button id="menu-btn" class="lg:hidden flex items-center justify-center w-9 h-9 cursor-pointer" aria-label="Przełącz menu">
                    <i data-lucide="menu" id="icon-menu" class="w-6 h-6 text-gray-600"></i>
                    <i data-lucide="x" id="icon-x" class="w-6 h-6 text-gray-600 hidden"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden lg:hidden border-t border-gray-100/60 bg-white/95 backdrop-blur-lg">
            <nav class="flex flex-col px-6 sm:px-10 py-10 space-y-6">
                <a href="#home" class="lato text-lg tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300">Home</a>
                <a href="#about" class="lato text-lg tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300">O nas</a>
                <a href="#how-it-works" class="lato text-lg tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300">Jak to działa?</a>
                <a href="#contact" class="lato text-lg tracking-tight text-gray-600 hover:text-[var(--accent)] transition-colors duration-300">Kontakt</a>
            </nav>
        </div>
    </header>

    <main class="pt-20 lg:pt-24">
        <!-- placeholder for page content -->
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        lucide.createIcons();

        (function() {
            var btn = document.getElementById('menu-btn');
            var menu = document.getElementById('mobile-menu');
            var iconMenu = document.getElementById('icon-menu');
            var iconX = document.getElementById('icon-x');
            if (btn && menu && iconMenu && iconX) {
                btn.addEventListener('click', function() {
                    menu.classList.toggle('hidden');
                    iconMenu.classList.toggle('hidden');
                    iconX.classList.toggle('hidden');
                });
            }
        })();
    </script>

</body>
</html>
